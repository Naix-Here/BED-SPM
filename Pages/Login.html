<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HawkerHub | Login</title>

    <link rel="stylesheet" href="Css/css.css">
    <link rel="stylesheet" href="Css/auth.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="auth-page">

<header class="navbar">
    <div class="logo" onclick="window.location='Home.html'">
        Hawker<span>Hub</span>
    </div>
</header>

<div class="auth-container">

    <div class="auth-card">

        <span class="hero-tag">Staff & Customer Portal</span>

        <h1>Welcome Back</h1>

        <p>
            Sign in to continue ordering meals, manage stalls,
            or access the HawkerHub management portal.
        </p>

        <form>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@email.com">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Password">
            </div>

            <button class="btn btn-primary btn-full">
                Login
            </button>

        </form>

        <div class="auth-footer">
            Don't have an account?
            <a href="Register.html">Create Account</a>
        </div>

    </div>

</div>

<script src="Js/auth.js"></script>

</body>
</html>
