<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>HawkerHub | Order History</title><link rel="stylesheet" href="../Css/patron.css"><style>
.order-card { display:grid; grid-template-columns:auto 1fr auto; gap:16px; align-items:center; padding:20px; background:var(--card); border:1px solid var(--border); border-radius:16px; margin-bottom:12px; transition:.2s border; }
.order-card:hover { border-color:rgba(251,146,60,.3); }
.order-icon { width:48px; height:48px; border-radius:12px; background:var(--accent-soft); display:grid; place-items:center; font-size:1.4rem; }
.order-price { text-align:right; }
.order-price strong { display:block; font-size:1.1rem; margin-bottom:4px; }
.status-badge { display:inline-block; border-radius:99px; padding:4px 10px; font-size:.68rem; font-weight:800; }
.status-badge.complete { background:var(--success-soft); color:var(--success); }
.status-badge.preparing { background:var(--accent-soft); color:var(--accent); }
.status-badge.cancelled { background:rgba(239,68,68,.15); color:#ef4444; }
.empty-state { text-align:center; padding:48px 20px; color:var(--muted); }
.metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:28px; }
@media (max-width:600px) { .metrics-row { grid-template-columns:1fr; } .order-card { grid-template-columns:auto 1fr; } .order-price { text-align:left; } }
</style></head><body><header class="navbar"><a class="logo" href="../Home-Page.html">Hawker<span>Hub</span></a><nav class="nav-links"><a href="Dashboard.html">Discover</a><a class="active" href="Order-History.html">My orders</a><a href="Profile.html" data-user-name></a></nav><div class="nav-actions"><a class="cart-link" href="Cart.html">Cart <span data-cart-count>0</span></a><a class="avatar" href="Profile.html" data-user-initials></a><button data-logout style="background:none;border:none;color:var(--muted);cursor:pointer;font:inherit">Logout</button></div></header><main class="page-shell narrow"><div class="page-title"><span class="eyebrow">Order centre</span><h1>My Orders</h1><p>View, cancel, and review your past orders.</p></div><div id="order-stats"></div><div class="filter-bar" style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap"><select id="order-status-filter" style="padding:8px 12px;color:var(--text);background:rgba(0,0,0,.24);border:1px solid var(--border);border-radius:10px;outline:none;font:inherit;font-size:.85rem"><option value="">All statuses</option><option value="Pending">Pending</option><option value="Preparing">Preparing</option><option value="Delivered">Delivered</option><option value="Cancelled">Cancelled</option></select><select id="order-sort" style="padding:8px 12px;color:var(--text);background:rgba(0,0,0,.24);border:1px solid var(--border);border-radius:10px;outline:none;font:inherit;font-size:.85rem"><option value="DESC">Newest first</option><option value="ASC">Oldest first</option></select><button class="btn btn-secondary btn-small" onclick="loadOrderHistory()">Apply</button></div><div id="order-history-list"><p>Loading orders…</p></div><div id="order-pagination"></div><p id="page-notice" hidden></p></main><footer>© 2026 HawkerHub Global Technologies Pte Ltd.</footer><script src="../Js/order-history.js"></script></body></html>
